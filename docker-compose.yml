version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: nuanceiq_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nuanceiq_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODEL_PATH=model/artifacts/distilbert-imdb
      - MODEL_MAX_LENGTH=512
      - CACHE_TTL_SECONDS=3600
      - RATE_LIMIT=100/minute
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./model/artifacts:/app/model/artifacts:ro

volumes:
  redis_data: